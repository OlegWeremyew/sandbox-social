# version: '3.8'

services:
  react:
    image: react_app
    build:
      context: ./react
    container_name: react_app_container
    ports:
      - "3333:3333"
    volumes:
      - ./react:/app
      - /app/node_modules
    depends_on:
      - express
      - nest
      - golang
    stdin_open: true
    tty: true
  svelte:
    image: svelte_app
    build:
      context: ./svelte
    ports:
      - "4444:4444"
    volumes:
      - ./svelte:/app
      - /app/node_modules
    depends_on:
      - express
      - nest
      - golang
    stdin_open: true
    tty: true
  vue:
    image: vue_app
    build:
      context: ./vue
    ports:
      - "8888:8888"
    volumes:
      - ./vue:/app
      - /app/node_modules
    depends_on:
      - express
      - nest
      - golang
    stdin_open: true
    tty: true
  express:
    image: express_app
    build:
      context: ./express
    ports:
      - "5555:5555"
#    depends_on:
#      mongo_db:
#        condition: service_healthy
#      redis_db:
#        condition: service_healthy
#      postgres_db:
#        condition: service_healthy
    volumes:
      - ./express:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  nest:
    image: nest_app
    build:
      context: ./nest
    ports:
      - "7777:7777"

  golang:
    image: golang_app
    build:
      context: ./golang
    ports:
      - "8081:8081"

