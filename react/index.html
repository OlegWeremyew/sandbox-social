<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔹 Основная информация -->
    <title>MySocial - Connect, Chat, Play & Share</title>
    <meta
      name="description"
      content="Общайся, находи друзей, играй, смотри видео и слушай музыку в удобной соцсети с мультиязычностью и сменой темы!"
    />
    <meta
      name="keywords"
      content="социальная сеть, чат, видео, музыка, друзья, игры, мультиязычность, dark mode"
    />
    <meta name="author" content="MySocial Team" />

    <!-- 🔹 Поддержка мультиязычности -->
    <meta http-equiv="content-language" content="en" />
    <meta name="robots" content="index, follow" />

    <!-- 🔹 Open Graph (для превью в соцсетях) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MySocial - Connect, Chat, Play & Share" />
    <meta
      property="og:description"
      content="Общайся, смотри видео, играй и слушай музыку в удобной соцсети с поддержкой мультиязычности и смены темы."
    />
    <meta property="og:image" content="/preview-image.jpg" />
    <meta property="og:url" content="https://mysocial.com" />
    <meta property="og:site_name" content="MySocial" />

    <!-- 🔹 Twitter Card (для превью в Twitter/X) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MySocial - Connect, Chat, Play & Share" />
    <meta
      name="twitter:description"
      content="Общайся, находи друзей, играй, смотри видео и слушай музыку в удобной соцсети."
    />
    <meta name="twitter:image" content="/preview-image.jpg" />

    <!-- 🔹 Progressive Web App (PWA) -->
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="/manifest.json" />

    <!-- 🔹 Основной Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon16x16.png">
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">

    <!-- 🔹 Apple Touch Icons (для iOS) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/apple-touch-icon-76x76.png">

    <!-- 🔹 Android и Chrome (Adaptive Icons) -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/android-chrome-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/android-chrome-512x512.png">

    <!-- 🔹 Microsoft (Windows 8/10 Tiles) -->
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/icons/mstile144x144.png">

    <!-- 🔹 macOS Safari Pinned Tab -->
    <link rel="mask-icon" href="/icons/favicon.ico" color="#5bbad5">

    <!-- 🔹 Meta-теги для удобного отображения на iOS и Android -->
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-title" content="Your App Name">
    <meta name="application-name" content="Your App Name">
    <meta name="msapplication-config" content="/sitemap.xml">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
